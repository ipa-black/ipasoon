<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPA SOON</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151921;
            --accent: #007aff;
            --text: #ffffff;
            --muted: #86868b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #11141b, var(--bg));
        }

        header h1 { font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        header p { color: var(--muted); margin-top: 10px; font-size: 1.1rem; }

        .container { max-width: 600px; margin: auto; padding: 20px; }

        .app-item {
            background: var(--card);
            border-radius: 35px; /* حواف فائقة النعومة */
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            opacity: 0; transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .app-item.show { opacity: 1; transform: translateY(0); }

        .app-icon {
            width: 65px; height: 65px;
            border-radius: 18px;
            margin-left: 15px;
            background: #222;
        }

        .app-info { flex: 1; }
        .app-info h3 { margin: 0; font-size: 1.1rem; }
        .app-info p { margin: 3px 0 0; color: var(--muted); font-size: 0.8rem; font-family: monospace; }

        .install-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-width: 90px;
        }

        .install-btn span { position: relative; z-index: 2; }

        .install-btn::after {
            content: '';
            position: absolute;
            top: 0; right: 0; height: 100%;
            width: 0%;
            background: var(--accent);
            z-index: 1;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .install-btn.loading { color: #fff; pointer-events: none; }
        .install-btn.loading::after { width: 100%; }

        #loading-ui { text-align: center; color: var(--muted); padding: 20px; }
    </style>
</head>
<body>

<header>
    <h1>IPA SOON</h1>
    <p>التطبيقات موقعة ب شهادة مجانية</p>
</header>

<div class="container">
    <div id="loading-ui">جاري التحميل...</div>
    <div id="app-list"></div>
</div>

<script>
    async function loadApps() {
        try {
            const res = await fetch('apps.json');
            const apps = await res.json();
            const list = document.getElementById('app-list');
            document.getElementById('loading-ui').remove();

            apps.forEach((app, i) => {
                const item = document.createElement('div');
                item.className = 'app-item';
                
                // إنشاء رابط البليست عبر الـ API
                const plistUrl = `https://${window.location.host}/api/install?name=${encodeURIComponent(app.name)}&ipa_url=${encodeURIComponent(app.ipa_url)}&bundle_id=${encodeURIComponent(app.bundle_id)}&image_url=${encodeURIComponent(app.image_url)}`;
                const itms = `itms-services://?action=download-manifest&url=${encodeURIComponent(plistUrl)}`;

                item.innerHTML = `
                    <img src="${app.image_url}" class="app-icon" onerror="this.src='https://via.placeholder.com/65'">
                    <div class="app-info">
                        <h3>${app.name}</h3>
                        <p>${app.bundle_id}</p>
                    </div>
                    <button class="install-btn" onclick="startInstall(this, '${itms}')">
                        <span>تثبيت</span>
                    </button>
                `;
                list.appendChild(item);
                setTimeout(() => item.classList.add('show'), i * 100);
            });
        } catch (e) { console.error(e); }
    }

    function startInstall(btn, url) {
        btn.classList.add('loading');
        btn.querySelector('span').innerText = 'جاري...';

        // تنفيذ التثبيت بعد انتهاء الأنميشن
        setTimeout(() => {
            // فتح رابط النظام
            window.location.assign(url);
            
            // التحويل للتليجرام بعد 2.5 ثانية (لضمان استجابة النظام)
            setTimeout(() => {
                window.location.replace('https://t.me/ipasoon');
            }, 2500);
        }, 1500);
    }

    loadApps();
</script>

</body>
</html>
