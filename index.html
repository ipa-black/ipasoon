<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA SOON</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --accent-color: #0a84ff;
            --header-gradient: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background: var(--header-gradient);
            text-align: center;
            padding: 4rem 1rem 3rem;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #ffffff, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .container {
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem; /* تقليل المسافة الجانبية للهواتف */
        }

        .app-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .app-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 15px;
            display: flex;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px);
            width: 100%; /* ضمان عدم تجاوز العرض */
        }

        .app-item:hover {
            transform: scale(1.02);
            border-color: rgba(10, 132, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .app-item.show {
            opacity: 1;
            transform: translateY(0);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            object-fit: cover;
            margin-left: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            flex-shrink: 0; /* منع الأيقونة من الانكماش */
        }

        .app-info {
            flex-grow: 1;
            min-width: 0; /* حل سحري يمنع النص من دفع الأزرار للخارج */
            margin-left: 10px;
        }

        .app-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* إضافة نقاط للأسماء الطويلة */
        }

        .app-info p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* إضافة نقاط للـ Bundle ID الطويل */
            direction: ltr; /* جعل اتجاه النص إنجليزي لتجنب الخلل */
            text-align: right;
        }

        .install-btn {
            background-color: #ffffff;
            color: #000000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-width: 90px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            flex-shrink: 0; /* يمنع الزر من الانكماش */
        }

        .install-btn span {
            position: relative;
            z-index: 2;
            transition: color 0.3s ease;
        }

        .install-btn::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            z-index: 1;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .install-btn:not(.loading):hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .install-btn.loading {
            pointer-events: none;
            box-shadow: 0 0 15px rgba(10, 132, 255, 0.5);
        }

        .install-btn.loading::before {
            width: 100%;
        }

        .install-btn.loading span {
            color: #ffffff;
        }

        .loading-text {
            text-align: center;
            color: var(--text-muted);
            margin-top: 2rem;
            font-size: 1.1rem;
        }

        /* تحسينات إضافية للهواتف الصغيرة جداً */
        @media (max-width: 380px) {
            .app-icon {
                width: 50px;
                height: 50px;
                margin-left: 10px;
            }
            .install-btn {
                padding: 8px 15px;
                min-width: 80px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>IPA SOON</h1>
        <p>التطبيقات موقعة بشهادة مجانية</p>
    </header>

    <div class="container">
        <div class="app-list" id="apps-container">
            <div class="loading-text" id="loading">جاري جلب القائمة...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('apps-container');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch('apps.json');
                const apps = await response.json();
                loading.remove();

                apps.forEach((app, index) => {
                    const apiUrl = `https://${window.location.host}/api/install?name=${encodeURIComponent(app.name)}&ipa_url=${encodeURIComponent(app.ipa_url)}&bundle_id=${encodeURIComponent(app.bundle_id)}&image_url=${encodeURIComponent(app.image_url)}`;
                    const installLink = `itms-services://?action=download-manifest&url=${encodeURIComponent(apiUrl)}`;

                    const appDiv = document.createElement('div');
                    appDiv.className = 'app-item';
                    
                    // أضفنا الخاصية onerror للصورة لكي تضع صورة احتياطية في حال فشل الرابط
                    appDiv.innerHTML = `
                        <img src="${app.image_url}" alt="${app.name}" class="app-icon" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg'">
                        <div class="app-info">
                            <h3>${app.name}</h3>
                            <p>${app.bundle_id}</p>
                        </div>
                        <button class="install-btn"><span>تثبيت</span></button>
                    `;

                    const btn = appDiv.querySelector('.install-btn');
                    const btnText = appDiv.querySelector('.install-btn span');

                    btn.addEventListener('click', (e) => {
                        e.preventDefault();

                        btn.classList.add('loading');
                        btnText.innerText = 'جاري...';

                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = installLink;
                        document.body.appendChild(iframe);

                        setTimeout(() => {
                            btnText.innerText = '100%';
                            
                            setTimeout(() => {
                                window.location.href = 'https://t.me/ipasoon';
                                setTimeout(() => document.body.removeChild(iframe), 1000);
                            }, 300);
                            
                        }, 1500);
                    });

                    container.appendChild(appDiv);

                    setTimeout(() => {
                        appDiv.classList.add('show');
                    }, index * 100);
                });

            } catch (error) {
                loading.innerText = 'خطأ في تحميل البيانات.';
                console.error(error);
            }
        });
    </script>

</body>
</html>
