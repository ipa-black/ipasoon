<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPA SOON</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #0a84ff;
            --text: #ffffff;
            --muted: #8b949e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            text-align: center;
        }

        header { padding: 60px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { font-size: 2.8rem; margin: 0; background: linear-gradient(#fff, #8b949e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        header p { color: var(--muted); margin-top: 10px; font-size: 1.1rem; }

        .container { max-width: 600px; margin: auto; padding: 20px; }

        .app-item {
            background: var(--card);
            border-radius: 35px; /* حواف ناعمة جداً */
            padding: 20px 25px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
            opacity: 0; transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .app-item.show { opacity: 1; transform: translateY(0); }

        .app-info h3 { margin: 0; font-size: 1.3rem; font-weight: 700; text-align: right; }

        .install-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 800;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-width: 110px;
            transition: transform 0.2s;
        }

        .install-btn span { position: relative; z-index: 2; }

        /* أنيميشن الامتلاء باللون الأزرق */
        .install-btn::after {
            content: '';
            position: absolute;
            top: 0; right: 0; height: 100%; width: 0%;
            background: var(--accent);
            z-index: 1;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .install-btn.loading { color: #fff; pointer-events: none; }
        .install-btn.loading::after { width: 100%; }

        .status-msg { color: var(--muted); padding: 20px; }
    </style>
</head>
<body>

<header>
    <h1>IPA SOON</h1>
    <p>التطبيقات موقعة بشهادة مجانية</p>
</header>

<div class="container" id="app-list">
    <p class="status-msg" id="status">جاري تحميل القائمة...</p>
</div>

<script>
    async function init() {
        try {
            const res = await fetch('apps.json');
            const data = await res.json();
            const list = document.getElementById('app-list');
            const status = document.getElementById('status');
            
            if (status) status.remove();

            data.apps.forEach((app, i) => {
                const item = document.createElement('div');
                item.className = 'app-item';
                
                // رابط الـ API المولد للـ plist
                const plistUrl = `https://${window.location.host}/api/install?name=${encodeURIComponent(app.name)}&url=${encodeURIComponent(app.downloadURL)}&bid=${encodeURIComponent(app.bundleIdentifier)}`;
                const itms = `itms-services://?action=download-manifest&url=${encodeURIComponent(plistUrl)}`;

                item.innerHTML = `
                    <div class="app-info">
                        <h3>${app.name}</h3>
                    </div>
                    <button class="install-btn" onclick="handleInstall(this, '${itms}')">
                        <span>تثبيت</span>
                    </button>
                `;
                list.appendChild(item);
                setTimeout(() => item.classList.add('show'), i * 100);
            });
        } catch (e) {
            document.getElementById('status').innerText = "فشل في تحميل التطبيقات.";
        }
    }

    function handleInstall(btn, url) {
        // تشغيل أنيميشن الزر
        btn.classList.add('loading');
        btn.querySelector('span').innerText = 'انتظر...';

        // 1. فتح رابط التثبيت بعد 100ms (لبدء العملية)
        setTimeout(() => {
            // نستخدم هذا الأسلوب لفتح التثبيت دون التأثير على الصفحة الحالية
            const a = document.createElement('a');
            a.href = url;
            a.click();
        }, 100);

        // 2. التحويل لـ Telegram بعد انتهاء الأنيميشن (1.5 ثانية)
        setTimeout(() => {
            btn.querySelector('span').innerText = 'تم!';
            window.location.href = 'https://t.me/ipasoon';
        }, 1500);
    }

    init();
</script>

</body>
</html>
