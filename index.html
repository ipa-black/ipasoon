<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA SOON</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --accent-color: #0a84ff;
            --header-gradient: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background: var(--header-gradient);
            text-align: center;
            padding: 5rem 1rem 4rem;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #ffffff, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            margin: 15px 0 0 0;
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .container {
            max-width: 700px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .app-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .app-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px);
        }

        .app-item:hover {
            transform: scale(1.02);
            border-color: rgba(10, 132, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .app-item.show {
            opacity: 1;
            transform: translateY(0);
        }

        .app-icon {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            object-fit: cover;
            margin-left: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .app-info {
            flex-grow: 1;
        }

        .app-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .app-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* تنسيقات زر التثبيت مع الأنيميشن */
        .install-btn {
            background-color: #ffffff;
            color: #000000;
            padding: 10px 28px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden; /* لإخفاء أي لون يخرج عن الحواف الدائرية */
            min-width: 110px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* النص داخل الزر (يجب أن يكون فوق طبقة اللون) */
        .install-btn span {
            position: relative;
            z-index: 2;
            transition: color 0.3s ease;
        }

        /* الطبقة الزرقاء المخفية التي ستمتلئ */
        .install-btn::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0; /* تبدأ من اليمين لليسار لأن الموقع عربي */
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            z-index: 1;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); /* سرعة تعبئة اللون */
        }

        /* تأثير الزر عند تمرير الماوس (قبل الضغط) */
        .install-btn:not(.loading):hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* حالة الزر أثناء التحميل (عند الضغط) */
        .install-btn.loading {
            pointer-events: none; /* منع الضغط مرتين */
            box-shadow: 0 0 15px rgba(10, 132, 255, 0.5);
        }

        /* تمدد اللون الأزرق ليصبح 100% */
        .install-btn.loading::before {
            width: 100%;
        }

        /* تحويل لون النص للأبيض عندما يغطيه اللون الأزرق */
        .install-btn.loading span {
            color: #ffffff;
        }

        .loading-text {
            text-align: center;
            color: var(--text-muted);
            margin-top: 2rem;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>IPA SOON</h1>
        <p>التطبيقات موقعة بشهادة مجانية</p>
    </header>

    <div class="container">
        <div class="app-list" id="apps-container">
            <div class="loading-text" id="loading">جاري جلب القائمة...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('apps-container');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch('apps.json');
                const apps = await response.json();
                loading.remove();

                apps.forEach((app, index) => {
                    const apiUrl = `https://${window.location.host}/api/install?name=${encodeURIComponent(app.name)}&ipa_url=${encodeURIComponent(app.ipa_url)}&bundle_id=${encodeURIComponent(app.bundle_id)}&image_url=${encodeURIComponent(app.image_url)}`;
                    const installLink = `itms-services://?action=download-manifest&url=${encodeURIComponent(apiUrl)}`;

                    const appDiv = document.createElement('div');
                    appDiv.className = 'app-item';
                    
                    appDiv.innerHTML = `
                        <img src="${app.image_url}" alt="${app.name}" class="app-icon">
                        <div class="app-info">
                            <h3>${app.name}</h3>
                            <p>${app.bundle_id}</p>
                        </div>
                        <button class="install-btn"><span>تثبيت</span></button>
                    `;

                    const btn = appDiv.querySelector('.install-btn');
                    const btnText = appDiv.querySelector('.install-btn span');

                    btn.addEventListener('click', (e) => {
                        e.preventDefault();

                        // 1. بدء تأثير التحميل (تعبئة اللون) وتغيير النص
                        btn.classList.add('loading');
                        btnText.innerText = 'جاري...';

                        // 2. فتح رابط التثبيت في "إطار مخفي"
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = installLink;
                        document.body.appendChild(iframe);

                        // 3. الانتظار حتى يكتمل اللون (1.5 ثانية) ثم التحويل
                        setTimeout(() => {
                            btnText.innerText = '100%'; // إشعار المستخدم باكتمال الشريط
                            
                            // تحويل بعد جزء بسيط من الثانية لرؤية اكتمال التحميل
                            setTimeout(() => {
                                window.location.href = 'https://t.me/ipasoon';
                                setTimeout(() => document.body.removeChild(iframe), 1000);
                            }, 300);
                            
                        }, 1500); // 1500 مللي ثانية (1.5 ثانية) وهي نفس مدة امتلاء اللون بالـ CSS
                    });

                    container.appendChild(appDiv);

                    // أنيميشن الظهور المتتابع
                    setTimeout(() => {
                        appDiv.classList.add('show');
                    }, index * 100);
                });

            } catch (error) {
                loading.innerText = 'خطأ في تحميل البيانات.';
                console.error(error);
            }
        });
    </script>

</body>
</html>
