<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPA SOON</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #0a84ff;
            --text: #ffffff;
            --muted: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            text-align: center;
        }

        header { padding: 50px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { font-size: 2.8rem; margin: 0; background: linear-gradient(#fff, #8b949e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--muted); margin-top: 10px; }

        .container { max-width: 650px; margin: auto; padding: 20px; }

        .app-item {
            background: var(--card);
            border-radius: 35px;
            padding: 18px 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            opacity: 0; transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .app-item.show { opacity: 1; transform: translateY(0); }

        .app-info { flex: 1; text-align: right; }
        .app-info h3 { margin: 0; font-size: 1.2rem; }
        .app-info p { margin: 4px 0 0; color: var(--muted); font-size: 0.8rem; font-family: monospace; }

        .install-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 800;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-width: 100px;
        }

        .install-btn span { position: relative; z-index: 2; }

        .install-btn::after {
            content: '';
            position: absolute;
            top: 0; right: 0; height: 100%; width: 0%;
            background: var(--accent);
            z-index: 1;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .install-btn.loading { color: #fff; pointer-events: none; }
        .install-btn.loading::after { width: 100%; }
    </style>
</head>
<body>

<header>
    <h1>IPA SOON</h1>
    <p>التطبيقات موقعة بشهادة مجانية</p>
</header>

<div class="container" id="app-list">
    <p id="status">جاري جلب التطبيقات...</p>
</div>

<script>
    async function init() {
        try {
            const res = await fetch('apps.json');
            const data = await res.json();
            const list = document.getElementById('app-list');
            document.getElementById('status').remove();

            data.apps.forEach((app, i) => {
                const item = document.createElement('div');
                item.className = 'app-item';
                
                // إنشاء رابط البليست المباشر
                const plistUrl = `https://${window.location.host}/api/install?name=${encodeURIComponent(app.name)}&url=${encodeURIComponent(app.downloadURL)}&bid=${encodeURIComponent(app.bundleIdentifier)}`;
                const itms = `itms-services://?action=download-manifest&url=${encodeURIComponent(plistUrl)}`;

                item.innerHTML = `
                    <div class="app-info">
                        <h3>${app.name}</h3>
                        <p>${app.bundleIdentifier}</p>
                    </div>
                    <button class="install-btn" onclick="install(this, '${itms}')">
                        <span>تثبيت</span>
                    </button>
                `;
                list.appendChild(item);
                setTimeout(() => item.classList.add('show'), i * 100);
            });
        } catch (e) { console.error("Error loading JSON", e); }
    }

    function install(btn, url) {
        btn.classList.add('loading');
        btn.querySelector('span').innerText = 'جاري...';

        setTimeout(() => {
            // تنفيذ التثبيت
            window.location.assign(url);
            
            // التحويل للتليجرام
            setTimeout(() => {
                window.location.replace('https://t.me/ipasoon');
            }, 3000);
        }, 1500);
    }

    init();
</script>

</body>
</html>
